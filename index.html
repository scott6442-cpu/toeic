        <div class="q-text${qClass}">${qText}</div>
        <div class="choices" id="choicesBox">${choicesHtml}</div>
        <div class="feedback-box" id="feedbackBox"></div>
        <div class="test-actions" id="testActions"></div>
      `;
    }

    // Render the blank in a grammar question as a styled span
    function highlightBlank(text) {
      const escaped = escapeHtml(text);
      return escaped.replace(/_____+/g, '<span class="blank">______</span>');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      })[m]);
    }

    // ===== Multi-meaning rendering =====
    function renderMeaningsList(meanings) {
      if (!meanings || meanings.length === 0) return "";
      if (meanings.length === 1) {
        const m = meanings[0];
        return `<div class="meaning-item single">
          <span class="m-pos">${escapeHtml(m.pos || "")}</span>
          <span class="m-kr">${escapeHtml(m.kr || "")}</span>
        </div>`;
      }
      return `<ol class="meaning-list">${
        meanings.map(m => `<li class="meaning-item">
          <span class="m-pos">${escapeHtml(m.pos || "")}</span>
          <span class="m-kr">${escapeHtml(m.kr || "")}</span>
        </li>`).join("")
      }</ol>`;
    }

    // ===== Pronunciation (Web Speech API) =====
    function speakWord(word) {
      if (!("speechSynthesis" in window)) {
        alert("이 브라우저는 음성 합성을 지원하지 않아요 😢");
        return;
      }
      try {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(word);
        utter.lang = "en-US";
        utter.rate = 0.92;
        utter.pitch = 1;
        // Prefer an en-US voice if available
        const voices = window.speechSynthesis.getVoices();
        const us = voices.find(v => /en[-_]US/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang));
        if (us) utter.voice = us;
        window.speechSynthesis.speak(utter);
      } catch (e) {
        console.warn("TTS failed:", e);
      }
    }
    // Pre-warm voices list on some browsers
    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // ===== Clickable example words =====
    // Tokenize keeping punctuation, wrap each letter-run in a <span>
    function renderClickableExample(sentence) {
      if (!sentence) return "";
      // Split on sequences of letters/apostrophes vs everything else
      const parts = sentence.split(/([A-Za-z][A-Za-z'\-]*)/);
      return parts.map(p => {
        if (/^[A-Za-z][A-Za-z'\-]*$/.test(p)) {
          const key = p.toLowerCase();
          const known = WORD_LOOKUP[key];
          if (known) {
            return `<span class="ex-word known" onclick="event.stopPropagation();showExampleWord('${escapeHtml(key)}')">${escapeHtml(p)}</span>`;
          } else {
            return `<span class="ex-word" onclick="event.stopPropagation();showExampleWord('${escapeHtml(key)}')">${escapeHtml(p)}</span>`;
          }
        }
        return escapeHtml(p);
      }).join("");
    }

    // ===== Inline dict lookup with stemming =====
    function lookupInlineDict(wordLower) {
      // Direct match
      if (typeof INLINE_DICT !== 'undefined' && INLINE_DICT[wordLower]) {
        return { word: wordLower, meaning: INLINE_DICT[wordLower] };
      }
      // Try stemming
      if (typeof stemWord === 'function') {
        const root = stemWord(wordLower);
        if (root !== wordLower) {
          // Check TOEIC vocab for stemmed form
          if (WORD_LOOKUP[root]) return null; // will be handled as TOEIC word
          if (typeof INLINE_DICT !== 'undefined' && INLINE_DICT[root]) {
            return { word: root, meaning: INLINE_DICT[root], original: wordLower };
          }
        }
      }
      return null;
    }

    // ===== Word meaning popup =====
    function showExampleWord(wordLower) {
      const popup = document.getElementById("wordPopup");
      if (!popup) return;

      // 1. Check TOEIC vocabulary
      const w = WORD_LOOKUP[wordLower];
      // 2. Try stemmed form in TOEIC vocab
      let stemmedW = null;
      if (!w && typeof stemWord === 'function') {
        const root = stemWord(wordLower);
        if (root !== wordLower) stemmedW = WORD_LOOKUP[root];
      }
      // 3. Try inline dict
      const dictEntry = !w && !stemmedW ? lookupInlineDict(wordLower) : null;

      if (w || stemmedW) {
        // Found in TOEIC vocabulary (direct or stemmed)
        const entry = w || stemmedW;
        const alreadySaved = !!wrongNotes[entry.word];
        popup.innerHTML = `
          <button class="wp-close" onclick="closeWordPopup()" aria-label="닫기">✕</button>
          <div class="wp-word">
            ${escapeHtml(entry.word)}
            ${stemmedW && !w ? `<span class="wp-stem-note">(← ${escapeHtml(wordLower)})</span>` : ""}
            <button class="speaker-btn" onclick="speakWord('${escapeHtml(entry.word)}')">🔊</button>
          </div>
          <div class="wp-day">Day ${entry.day} · 학습 단어</div>
          ${renderMeaningsList(entry.meanings)}
          <div class="wp-save-row">
            ${alreadySaved
              ? '<div class="wp-saved">📕 이미 오답노트에 저장됨</div>'
              : `<button class="wp-save-btn" onclick="saveWordToNotes('${escapeHtml(entry.word)}', this)">📕 오답노트에 저장</button>`
            }
          </div>
        `;
      } else if (dictEntry) {
        // Found in inline dictionary (common English word)
        const showRoot = dictEntry.original ? `<span class="wp-stem-note">(← ${escapeHtml(dictEntry.original)})</span>` : "";
        popup.innerHTML = `
          <button class="wp-close" onclick="closeWordPopup()" aria-label="닫기">✕</button>
          <div class="wp-word">
            ${escapeHtml(dictEntry.word)} ${showRoot}
            <button class="speaker-btn" onclick="speakWord('${escapeHtml(dictEntry.word)}')">🔊</button>
          </div>
          <div class="wp-day">기본 영어 단어</div>
          <div class="wp-dict-meaning">${escapeHtml(dictEntry.meaning)}</div>
        `;
      } else {
        // Not found anywhere — show Naver link as fallback
        popup.innerHTML = `
          <button class="wp-close" onclick="closeWordPopup()" aria-label="닫기">✕</button>
          <div class="wp-word">
            ${escapeHtml(wordLower)}
            <button class="speaker-btn" onclick="speakWord('${escapeHtml(wordLower)}')">🔊</button>
          </div>
          <div class="wp-day" style="color:var(--ink-muted);">사전에 없는 단어</div>
          <div class="wp-external">
            <a href="https://en.dict.naver.com/#/search?query=${encodeURIComponent(wordLower)}" target="_blank" rel="noopener noreferrer">
              🔗 네이버 사전에서 뜻 보기
            </a>
          </div>
        `;
      }
      popup.classList.add("show");
      document.getElementById("popupBackdrop").classList.add("show");
    }

    function saveWordToNotes(word, btnEl) {
      wrongNotes[word] = true;
      saveNotes();
      if (btnEl) {
        btnEl.outerHTML = '<div class="wp-saved">📕 오답노트에 저장되었어요 ✅</div>';
      }
    }

    function closeWordPopup() {
      document.getElementById("wordPopup").classList.remove("show");
      document.getElementById("popupBackdrop").classList.remove("show");
    }

    function pickChoice(idx) {
      if (qState.solved) return;
      if (qState.wrongAttempts.includes(idx)) return;
      if (qState.showingFeedback) return;

      const q = currentTest.questions[currentTest.idx];
      const picked = q.choices[idx];
      let isCorrect;
      if (q.mode === 'word') {
        isCorrect = picked.word === q.correctWord.word;
      } else {
        isCorrect = picked.correct === true;
      }

      qState.pickedIdx = idx;

      if (isCorrect) {
        handleCorrect(idx);
      } else {
        handleWrong(idx);
      }
    }

    function handleCorrect(idx) {
      const q = currentTest.questions[currentTest.idx];
      qState.solved = true;
      const firstTry = qState.wrongAttempts.length === 0;
      if (firstTry) currentTest.correctFirstTry++;

      // Highlight correct
      const btns = document.querySelectorAll("#choicesBox .choice");
      btns.forEach((b, i) => {
        b.disabled = true;
        if (i === idx) b.classList.add("correct");
      });

      // Feedback
      const fb = document.getElementById("feedbackBox");
      fb.className = "feedback-box correct show";
      let body = "";
      if (q.mode === 'word') {
        body = `<b>${escapeHtml(q.correctWord.word)}</b> (${escapeHtml(q.correctWord.partOfSpeech)})
          — <b>${escapeHtml(q.correctWord.meaning)}</b><br>
          <span style="color:#4b5563;font-size:13px;">
            ${escapeHtml(q.correctWord.exampleSentence)}
          </span>`;
      } else {
        const correct = q.choices.find(c => c.correct);
        body = `<b>${escapeHtml(correct.text)}</b> 가 정답이에요.<br>
          <span style="color:#4b5563;font-size:13px;margin-top:6px;display:inline-block;">
            ${escapeHtml(q.explanation)}
          </span>`;
      }
      fb.innerHTML = `
        <div class="celebrate">${firstTry ? "✨🎉✨" : "✅"}</div>
        <div class="fb-title">${firstTry ? "정답! 한 번에 맞췄어요!" : "정답이에요!"}</div>
        <div class="fb-body">${body}</div>
      `;

      renderNextButton();
    }

    function handleWrong(idx) {
      const q = currentTest.questions[currentTest.idx];
      const picked = q.choices[idx];
      qState.wrongAttempts.push(idx);
      qState.showingFeedback = true;

      // Add to wrong notes (first wrong only)
      if (qState.wrongAttempts.length === 1) {
        if (q.mode === 'word') {
          wrongNotes[q.correctWord.word] = true;
          saveNotes();
          currentTest.wrongWords.add(q.correctWord.word);
        } else {
          // Grammar: dedupe by topicId + question text
          const already = grammarNotes.some(g => g.topicId === q.topicId && g.q === q.questionText);
          if (!already) {
            grammarNotes.push({
              topicId: q.topicId,
              topicTitle: q.topicTitle,
              level: q.level,
              levelName: q.levelName,
              q: q.questionText,
              choices: q.sourceQ.choices,
              explanation: q.explanation,
              savedAt: Date.now()
            });
            saveGrammarNotes();
          }
          currentTest.wrongQs.push(q);
        }
      }

      // Highlight just-picked as "wrong" (animated)
      const btns = document.querySelectorAll("#choicesBox .choice");
      btns.forEach((b, i) => {
        b.classList.remove("wrong");
        if (qState.wrongAttempts.includes(i) && i !== idx) {
          b.classList.add("wrong-muted");
          b.disabled = true;
        }
      });
      const currentBtn = btns[idx];
      currentBtn.classList.remove("wrong-muted");
      currentBtn.classList.add("wrong");
      currentBtn.disabled = true;

      // Compose explanation for WHY this choice is wrong
      const explanation = composeWrongExplanation(q, picked);

      const fb = document.getElementById("feedbackBox");
      fb.className = "feedback-box wrong show";
      fb.innerHTML = `
        <div class="fb-title">❌ 이 선지는 오답이에요</div>
        <div class="fb-body">${explanation}</div>
      `;

      // If user has now used all 3 wrong choices, auto-reveal the answer
      if (qState.wrongAttempts.length === 3) {
        revealAnswer();
      } else {
        // Show retry button
        const actions = document.getElementById("testActions");
        actions.innerHTML = `
          <button class="btn-retry" onclick="retryQuestion()">🔄 다시 풀어보세요</button>
        `;
      }
    }

    function composeWrongExplanation(q, picked) {
      if (q.mode === 'word') {
        const pickedEn = escapeHtml(picked.word);
        const pickedKr = escapeHtml(picked.meaning);
        if (q.type === 1) {
          return `<b>'${pickedKr}'</b>는 <b>${pickedEn}</b>의 뜻이에요.
            이 문제의 단어 <b>${escapeHtml(q.correctWord.word)}</b>와는 의미가 달라요.`;
        } else if (q.type === 2) {
          return `<b>${pickedEn}</b>는 <b>'${pickedKr}'</b>라는 뜻이에요.
            문제에서 물어본 <b>'${escapeHtml(q.correctWord.meaning)}'</b>와는 의미가 달라요.`;
        } else {
          return `<b>${pickedEn}</b>는 <b>'${pickedKr}'</b>라는 뜻이에요.
            이 문장의 맥락에는 어울리지 않아요. 문장을 다시 한 번 천천히 읽어보세요.`;
        }
      } else {
        // Grammar — each wrong choice has its own reason authored in data
        const reason = picked.wrongReason || "이 선지는 정답이 아니에요.";
        // Progressive hint: on later attempts, append hint about position/clue
        let extra = "";
        if (qState.wrongAttempts.length === 2) {
          extra = `<br><span style="color:#92400e;font-weight:700;">💡 힌트: 문장의 구조(주어/시제/형태)를 다시 확인해보세요.</span>`;
        }
        return `<b>${escapeHtml(picked.text)}</b> — ${reason}${extra}`;
      }
    }

    function retryQuestion() {
      qState.showingFeedback = false;
      // Hide feedback box and clear retry button
      document.getElementById("feedbackBox").classList.remove("show");
      document.getElementById("testActions").innerHTML = "";
      // Mute previously wrong buttons so the user can see which are still available
      const btns = document.querySelectorAll("#choicesBox .choice");
      qState.wrongAttempts.forEach(i => {
        btns[i].classList.remove("wrong");
        btns[i].classList.add("wrong-muted");
        btns[i].disabled = true;
      });
    }

    function revealAnswer() {
      qState.solved = true;
      qState.revealed = true;

      const q = currentTest.questions[currentTest.idx];
      let correctIdx;
      if (q.mode === 'word') {
        correctIdx = q.choices.findIndex(c => c.word === q.correctWord.word);
      } else {
        correctIdx = q.choices.findIndex(c => c.correct);
      }

      const btns = document.querySelectorAll("#choicesBox .choice");
      btns.forEach((b, i) => {
        b.disabled = true;
        if (i === correctIdx) {
          b.classList.remove("wrong", "wrong-muted");
          b.classList.add("correct");
        }
      });

      const fb = document.getElementById("feedbackBox");
      fb.className = "feedback-box correct show";
      let body = "";
      if (q.mode === 'word') {
        body = `정답은 <b>${escapeHtml(q.correctWord.word)}</b> — <b>${escapeHtml(q.correctWord.meaning)}</b> 이에요.<br>
          <span style="color:#4b5563;font-size:13px;margin-top:6px;display:inline-block;">
            ${escapeHtml(q.correctWord.exampleSentence)}<br>
            ${escapeHtml(q.correctWord.exampleTranslation)}
          </span>`;
      } else {
        const correct = q.choices[correctIdx];
        body = `정답은 <b>${escapeHtml(correct.text)}</b> 이에요.<br>
          <span style="color:#4b5563;font-size:13px;margin-top:6px;display:inline-block;">
            ${escapeHtml(q.explanation)}
          </span>`;
      }
      fb.innerHTML = `
        <div class="fb-title">💡 정답 공개</div>
        <div class="fb-body">${body}</div>
      `;
      renderNextButton();
    }

    function renderNextButton() {
      const actions = document.getElementById("testActions");
      const isLast = currentTest.idx >= currentTest.questions.length - 1;
      actions.innerHTML = `
        <button class="btn-next-q" onclick="nextQuestion()">
          ${isLast ? "🏁 결과 보기" : "다음 문제 →"}
        </button>
      `;
    }

    function nextQuestion() {
      if (currentTest.idx >= currentTest.questions.length - 1) {
        showResult();
        return;
      }
      currentTest.idx++;
      renderQuestion();
    }

    function exitTest() {
      if (!confirm("테스트를 종료할까요?")) return;
      currentTest = null;
      switchTab("viewWordStudy");
    }

    function showResult() {
      const total = currentTest.questions.length;
      const score = currentTest.correctFirstTry;
      const pct = Math.round((score / total) * 100);

      let emoji = "🎉", msg = "";
      if (pct === 100) { emoji = "🏆"; msg = "완벽해요! 950점 가즈아!"; }
      else if (pct >= 85) { emoji = "🌟"; msg = "훌륭해요! 950점이 바로 눈앞!"; }
      else if (pct >= 70) { emoji = "👏"; msg = "잘했어요! 틀린 문제 복습하면 완벽!"; }
      else if (pct >= 50) { emoji = "💪"; msg = "조금만 더! 오답노트로 약점을 보완해봐요."; }
      else { emoji = "📚"; msg = "괜찮아요. 다시 학습하고 재도전해봐요!"; }

      let wrongList = "";
      let wrongCount = 0;
      let retryBtn = "";

      if (currentTest.mode === 'word') {
        wrongCount = currentTest.wrongWords.size;
        wrongList = Array.from(currentTest.wrongWords).map(w => {
          const word = TOEIC_WORDS.find(x => x.word === w);
          return word ? `<div class="wrong-item">
            <b>${escapeHtml(word.word)}</b>
            <span>${escapeHtml(word.partOfSpeech)} · ${escapeHtml(word.meaning)}</span>
          </div>` : "";
        }).join("");
        retryBtn = `<button class="btn-retest" onclick="startWordTest(${currentTest.day})">🔁 다시 테스트</button>`;
      } else {
        wrongCount = currentTest.wrongQs.length;
        wrongList = currentTest.wrongQs.map(q => `<div class="wrong-item">
          <b>${escapeHtml(truncate(q.questionText, 60))}</b>
          <span>${escapeHtml(q.topicTitle)} · ${escapeHtml(q.levelName)}</span>
        </div>`).join("");
        retryBtn = `<button class="btn-retest" onclick="startGrammarTest('${currentTest.topicId}','${currentTest.level}')">🔁 다시 테스트</button>`;
      }

      const titleText = currentTest.mode === 'word'
        ? `Day ${currentTest.day} 테스트 완료!`
        : `${escapeHtml(currentTest.title)} 완료!`;

      const homeTarget = currentTest.mode === 'word' ? 'viewWordTest' : 'viewGrammarTest';

      document.getElementById("resultCard").innerHTML = `
        <div class="result-emoji">${emoji}</div>
        <div class="result-title">${titleText}</div>
        <div class="result-score">${score} / ${total}</div>
        <div class="result-sub">첫 시도 정답률 · ${pct}%</div>
        <div class="result-msg">${msg}</div>
        ${wrongList ? `<div class="wrong-list">
          <h3>📕 오답노트에 저장됨 (${wrongCount}개)</h3>
          ${wrongList}
        </div>` : '<div class="result-msg">틀린 문제가 없어요! 🎊</div>'}
        <div class="result-actions">
          <button class="btn-home" onclick="switchTab('${homeTarget}')">🏠 메뉴로</button>
          ${retryBtn}
        </div>
      `;
      showView("viewResult");
    }

    function truncate(s, n) {
      return s.length > n ? s.slice(0, n) + "…" : s;
    }

    // ========================================================
    //                  WRONG NOTES MODULE
    // ========================================================
    // ===== Notes sub-tab state =====
    let notesSubtab = "word"; // 'word' | 'grammar'
    function switchNotesSubtab(tab) {
      notesSubtab = tab;
      renderNotes();
    }

    function renderNotes() {
      const container = document.getElementById("notesList");
      const wordKeys = Object.keys(wrongNotes);
      const grammarCount = grammarNotes.length;
      const wordCount = wordKeys.length;

      // Top sub-tab bar (always visible)
      const tabs = `
        <div class="notes-subtabs">
          <button class="notes-subtab ${notesSubtab === 'word' ? 'active' : ''}"
            onclick="switchNotesSubtab('word')">
            📚 단어 <span class="count-pill">${wordCount}</span>
          </button>
          <button class="notes-subtab ${notesSubtab === 'grammar' ? 'active' : ''}"
            onclick="switchNotesSubtab('grammar')">
            📖 어법 <span class="count-pill">${grammarCount}</span>
          </button>
        </div>
      `;

      let body = "";

      if (notesSubtab === 'word') {
        const wordItems = wordKeys
          .map(k => WORD_LOOKUP[k.toLowerCase()])
          .filter(Boolean)
          .sort((a, b) => a.day - b.day || a.word.localeCompare(b.word));

        if (wordItems.length === 0) {
          body = `
            <div class="notes-empty">
              <div class="big">📭</div>
              단어 오답노트가 비어 있어요.<br>
              <span style="font-size:13px;">테스트에서 틀린 단어나 예문 클릭 시<br>자동으로 여기에 쌓여요.</span>
            </div>
          `;
        } else {
          body = wordItems.map(w => {
            const primaryMeaning = w.meanings && w.meanings[0] ? w.meanings[0].kr : w.meaning;
            return `
              <div class="note-card">
                <div class="emoji">${w.situationEmoji.slice(0, 4)}</div>
                <div class="content">
                  <div class="word">
                    ${escapeHtml(w.word)}
                    <button class="speaker-btn" onclick="event.stopPropagation();speakWord('${escapeHtml(w.word)}')" style="width:24px;height:24px;font-size:11px;">🔊</button>
                  </div>
                  <div class="meaning">${escapeHtml(w.partOfSpeech)} · ${escapeHtml(primaryMeaning)}</div>
                </div>
                <div class="day-tag">Day ${w.day}</div>
                <button onclick="removeWordNote('${escapeHtml(w.word)}')" title="제거">✕</button>
              </div>
            `;
          }).join("");
        }
      } else {
        // Grammar tab
        const sortedGrammar = grammarNotes.slice().sort((a, b) => {
          if (a.topicId !== b.topicId) return a.topicId.localeCompare(b.topicId);
          return (a.savedAt || 0) - (b.savedAt || 0);
        });

        if (sortedGrammar.length === 0) {
          body = `
            <div class="notes-empty">
              <div class="big">📭</div>
              어법 오답노트가 비어 있어요.<br>
              <span style="font-size:13px;">어법 테스트에서 틀린 문제가<br>자동으로 여기에 쌓여요.</span>
            </div>
          `;
        } else {
          body = sortedGrammar.map((g, i) => {
            const correct = g.choices.find(c => c.correct);
            return `<div class="grammar-note-card">
              <button class="gn-remove" onclick="removeGrammarNote(${i})" title="제거">✕</button>
              <div class="gn-topic">${escapeHtml(g.topicTitle)} · ${escapeHtml(g.levelName)}</div>
              <div class="gn-q">${highlightBlank(g.q)}</div>
              <div class="gn-answer">✅ ${escapeHtml(correct ? correct.text : "-")} — ${escapeHtml(g.explanation)}</div>
            </div>`;
          }).join("");
        }
      }

      container.innerHTML = tabs + body;
    }

    function removeWordNote(word) {
      delete wrongNotes[word];
      saveNotes();
      renderNotes();
    }
    function removeGrammarNote(idx) {
      // Index based on sorted order in render — find the real index safely
      // Use sort criteria to map back
      const sortedGrammar = grammarNotes.slice().sort((a, b) => {
        if (a.topicId !== b.topicId) return a.topicId.localeCompare(b.topicId);
        return (a.savedAt || 0) - (b.savedAt || 0);
      });
      const target = sortedGrammar[idx];
      if (!target) return;
      const realIdx = grammarNotes.findIndex(g => g.topicId === target.topicId && g.q === target.q);
      if (realIdx >= 0) grammarNotes.splice(realIdx, 1);
      saveGrammarNotes();
      renderNotes();
    }

    function clearAllNotes() {
      if (!confirm("단어·어법 오답노트를 전부 지울까요?")) return;
      wrongNotes = {};
      grammarNotes = [];
      saveNotes();
      saveGrammarNotes();
      renderNotes();
      renderProgress();
    }

    // ========================================================
    //                WORD TEST MENU
    // ========================================================
    function renderWordTestMenu() {
      const container = document.getElementById("wordTestDayPicker");
      let html = "";
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        const list = wordsOfDay(d);
        const done = dayCompletedCount(d);
        const ready = done >= list.length;
        html += `<button class="day-picker-card ${ready ? 'ready' : ''}"
          onclick="startWordTest(${d})">
          <div class="dp-day">Day ${d}</div>
          <div class="dp-status">${ready ? '✅ 완료 · 테스트 가능' : `${done}/${list.length} 학습 · 테스트 가능`}</div>
        </button>`;
      }
      container.innerHTML = html;
    }

    // ========================================================
    //                GRAMMAR STUDY MODULE
    // ========================================================

      // Level 3: viewing rule cards (topic + level selected)
      if (grammarNav.topic && grammarNav.level) {
        const topic = GRAMMAR_TOPICS.find(t => t.id === grammarNav.topic);
        const level = topic.levels[grammarNav.level];
        container.innerHTML = `
          <button class="back-chip" onclick="grammarStudyBack()">← 난이도 선택</button>
          <div class="rule-section-header">
            <div class="icon">${topic.icon}</div>
            <div>
              <h2>${escapeHtml(topic.title)}</h2>
              <p>${escapeHtml(level.name)} · ${escapeHtml(level.summary)}</p>
            </div>
          </div>
          ${level.rules.map(r => `
            <div class="rule-card">
              <div class="r-title">${r.title}</div>
              <div class="r-body">${r.body}</div>
              <div class="r-example">
                <div class="r-example-en">${r.example}</div>
                ${r.translation ? `<div class="r-example-kr">${escapeHtml(r.translation)}</div>` : ""}
              </div>
            </div>
          `).join("")}
          <button class="btn-big" onclick="startGrammarTest('${topic.id}','${grammarNav.level}')">
            📝 이 난이도 테스트 보기 (10문제)
          </button>
        `;
        return;
      }

      // Level 2: topic selected, show level picker
      if (grammarNav.topic) {
        const topic = GRAMMAR_TOPICS.find(t => t.id === grammarNav.topic);
        container.innerHTML = `
          <button class="back-chip" onclick="grammarStudyBack()">← 주제 선택</button>
          <div class="rule-section-header">
            <div class="icon">${topic.icon}</div>
            <div>
              <h2>${escapeHtml(topic.title)}</h2>
              <p>난이도를 선택하세요</p>
            </div>
          </div>
          <div class="level-picker">
            ${["easy","medium","hard"].map(lv => {
              const L = topic.levels[lv];
              const wrongHere = grammarNotes.filter(g => g.topicId === topic.id && g.level === lv).length;
              return `<button class="level-card ${lv}" onclick="grammarStudySelectLevel('${lv}')">
                <div class="l-badge">${lv === 'easy' ? '하' : lv === 'medium' ? '중' : '상'}</div>
                <div class="l-body">
                  <div class="l-name">${escapeHtml(L.name)}</div>
                  <div class="l-summary">${escapeHtml(L.summary)}</div>
                  ${wrongHere ? `<span class="l-wrong-count">오답 ${wrongHere}</span>` : ""}
                </div>
              </button>`;
            }).join("")}
          </div>
        `;
        return;
      }

      // Level 1: topic grid
      container.innerHTML = `
        <div class="grammar-intro">
          <h2>📖 어법 학습</h2>
          <p>주제를 선택하거나, 전체 섞기로 학습하세요</p>
        </div>
        <button class="btn-big" style="margin-bottom:18px;" onclick="renderMixedGrammarStudy()">
          🔀 전체 섞기 — 모든 주제의 규칙을 랜덤으로
        </button>
        <div class="topic-grid">
          ${GRAMMAR_TOPICS.map(t => `
            <button class="topic-card" onclick="grammarStudySelectTopic('${t.id}')">
              <div class="t-icon">${t.icon}</div>
              <div class="t-title">${escapeHtml(t.title)}</div>
              <div class="t-desc">${escapeHtml(t.description)}</div>
            </button>
          `).join("")}
        </div>
      `;
    }

    function grammarStudySelectTopic(topicId) {
      grammarNav.topic = topicId;
      grammarNav.level = null;
      renderGrammarStudy();
    }
    function grammarStudySelectLevel(level) {
      grammarNav.level = level;
      renderGrammarStudy();
    }
    function grammarStudyBack() {
      if (grammarNav.level) { grammarNav.level = null; renderGrammarStudy(); return; }
      if (grammarNav.topic) { grammarNav.topic = null; renderGrammarStudy(); return; }
    }

    // ===== Mixed Grammar Study (all topics shuffled) =====
    function renderMixedGrammarStudy() {
      const container = document.getElementById("grammarStudyContent");
      // Collect ALL rules from ALL topics and levels, shuffle
      const allRules = [];
      GRAMMAR_TOPICS.forEach(t => {
        ["easy","medium","hard"].forEach(lv => {
          const L = t.levels[lv];
          if (L && L.rules) {
            L.rules.forEach(r => allRules.push({
              ...r,
              topicIcon: t.icon,
              topicTitle: t.title,
              levelName: L.name
            }));
          }
        });
      });
      const shuffled = shuffle(allRules);

      container.innerHTML = `
        <button class="back-chip" onclick="grammarNav={topic:null,level:null};renderGrammarStudy()">← 주제 선택</button>
        <div class="rule-section-header">
          <div class="icon">🔀</div>
          <div>
            <h2>전체 섞기 학습</h2>
            <p>모든 주제 · 모든 난이도의 규칙을 랜덤으로 (${shuffled.length}개)</p>
          </div>
        </div>
        ${shuffled.map(r => `
          <div class="rule-card">
            <div style="display:flex;gap:6px;margin-bottom:8px;">
              <span class="q-type-badge">${r.topicIcon} ${escapeHtml(r.topicTitle)}</span>
              <span class="q-type-badge" style="background:var(--cream-deep);color:var(--ink-muted);">${escapeHtml(r.levelName)}</span>
            </div>
            <div class="r-title">${r.title}</div>
            <div class="r-body">${r.body}</div>
            <div class="r-example">
              <div class="r-example-en">${r.example}</div>
              ${r.translation ? `<div class="r-example-kr">${escapeHtml(r.translation)}</div>` : ""}
            </div>
          </div>
        `).join("")}
        <button class="btn-big" onclick="startMixedGrammarTest()">
          📝 전체 섞기 테스트 보기 (15문제)
        </button>
      `;
    }

    // ===== Mixed Grammar Test (all topics + levels, shuffled) =====
    function startMixedGrammarTest() {
      // Pool ALL questions from ALL topics and levels
      const allQs = [];
      GRAMMAR_TOPICS.forEach(t => {
        ["easy","medium","hard"].forEach(lv => {
          const L = t.levels[lv];
          if (L && L.questions) {
            L.questions.forEach(q => allQs.push({
              mode: 'grammar',
              questionText: q.q,
              choices: shuffle(q.choices.slice()),
              explanation: q.explanation,
              sourceQ: q,
              topicId: t.id,
              topicTitle: t.title,
              level: lv,
              levelName: L.name
            }));
          }
        });
      });

      // Pick 15 random from the pool
      const picked = shuffle(allQs).slice(0, 15);

      currentTest = {
        mode: 'grammar',
        topicId: 'mixed',
        level: 'mixed',
        title: '🔀 전체 섞기 어법 테스트',
        questions: picked,
        idx: 0,
        correctFirstTry: 0,
        wrongQs: []
      };
      showView("viewTest");
      document.getElementById("testTitle").textContent = currentTest.title;
      renderQuestion();
    }

    // ========================================================
    //                GRAMMAR TEST MENU
    // ========================================================
    function renderGrammarTestMenu() {
      const container = document.getElementById("grammarTestContent");
      container.innerHTML = `
        <div class="grammar-intro">
          <h2>✍️ 어법 테스트</h2>
          <p>주제별 또는 전체 섞기로 테스트하세요</p>
        </div>
        <button class="btn-big" style="margin-bottom:18px;" onclick="startMixedGrammarTest()">
          🔀 전체 섞기 테스트 — 모든 주제에서 랜덤 15문제
        </button>
        ${GRAMMAR_TOPICS.map(t => `
          <div class="rule-card" style="padding:14px 16px;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
              <span style="font-size:22px;">${t.icon}</span>
              <b style="font-size:15px;color:#4c1d95;">${escapeHtml(t.title)}</b>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
              ${["easy","medium","hard"].map(lv => {
                const label = lv === 'easy' ? '하' : lv === 'medium' ? '중' : '상';
                const color = lv === 'easy' ? '#10b981' : lv === 'medium' ? '#f59e0b' : '#ef4444';
                return `<button onclick="startGrammarTest('${t.id}','${lv}')"
                  style="padding:10px;border:none;border-radius:10px;background:${color};color:#fff;font-weight:800;cursor:pointer;font-size:13px;">
                  ${label}
                </button>`;
              }).join("")}
            </div>
          </div>
        `).join("")}
      `;
    }

    // ========================================================
    //                    VIEW SWITCHER
    // ========================================================
    function showView(id) {
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      const el = document.getElementById(id);
      if (el) el.classList.add("active");
      // Hide main nav during test/result
      const nav = document.getElementById("mainNav");
      if (id === "viewTest" || id === "viewResult") {
        nav.style.display = "none";
      } else {
        nav.style.display = "";
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function switchTab(viewId) {
      // Update nav tab highlight
      document.querySelectorAll(".main-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.view === viewId);
      });
      // Render content for the target view
      if (viewId === "viewWordStudy") {
        renderDayTabs();
        renderProgress();
      } else if (viewId === "viewWordTest") {
        renderWordTestMenu();
      } else if (viewId === "viewGrammarStudy") {
        renderGrammarStudy();
      } else if (viewId === "viewGrammarTest") {
        renderGrammarTestMenu();
      } else if (viewId === "viewNotes") {
        renderNotes();
      }
      showView(viewId);
    }

    // ===== Init =====
    renderDayTabs();
    renderCard();
    renderProgress();
    updateDayArrows();
    setupCardSwipe();
  </script>
</body>
</html>
