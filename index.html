<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEIC 950 단어 학습</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    /* ===================================================================
       DESIGN TOKENS — soft neo-pastel + warm cream + charcoal ink
       Target: 20s female, daily study companion, IG-screenshot worthy
       =================================================================== */
    :root {
      /* Brand palette */
      --cream: #FDFBF7;
      --cream-deep: #F7F2EA;
      --ivory: #FAF7F2;
      --blush: #F4C2C2;
      --blush-soft: #FFE4E1;
      --blush-deep: #E8A5A5;
      --butter: #FFF4B5;
      --butter-soft: #FFF9DC;
      --sage: #B5C9A8;
      --sage-soft: #D9E5CE;
      --lavender: #C8B6E2;
      --lavender-soft: #E6DCF3;
      --peach: #FFD4B8;
      --mocha: #B89A7F;

      /* Ink (charcoal, never pure black) */
      --ink: #2D2A32;
      --ink-soft: #4A4652;
      --ink-muted: #7A7583;
      --ink-faint: #A9A3B2;

      /* Semantic */
      --bg: linear-gradient(165deg, #FFF4EC 0%, #FDF0F4 45%, #F3EEFA 100%);
      --surface: #FFFFFF;
      --surface-warm: #FDFBF7;
      --surface-tint: #FAF6F0;
      --border: #EFE8DE;
      --border-strong: #E4DACB;

      /* Feedback */
      --success: #6FA07A;
      --success-bg: #E8F1E4;
      --warn: #D99559;
      --warn-bg: #FBF0E0;
      --danger: #D47373;
      --danger-bg: #FBE8E8;

      /* Radius */
      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 22px;
      --r-xl: 28px;
      --r-pill: 999px;

      /* Shadow — multi-layer soft */
      --sh-sm: 0 1px 2px rgba(72, 52, 90, 0.04), 0 2px 8px rgba(72, 52, 90, 0.04);
      --sh-md: 0 2px 6px rgba(72, 52, 90, 0.05), 0 8px 24px rgba(72, 52, 90, 0.06);
      --sh-lg: 0 4px 12px rgba(72, 52, 90, 0.06), 0 20px 48px rgba(72, 52, 90, 0.10);
      --sh-xl: 0 6px 20px rgba(72, 52, 90, 0.08), 0 30px 70px rgba(72, 52, 90, 0.14);
      --sh-glow-blush: 0 10px 30px rgba(232, 165, 165, 0.28);
      --sh-glow-sage: 0 10px 30px rgba(111, 160, 122, 0.22);
      --sh-glow-lav: 0 10px 30px rgba(200, 182, 226, 0.32);

      /* Motion */
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--ink);
      font-feature-settings: "ss01", "ss02";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
    }

    /* Ambient floating blobs for texture */
    body::before {
      content: "";
      position: fixed;
      top: -180px;
      right: -140px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(244, 194, 194, 0.55) 0%, rgba(244, 194, 194, 0) 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(8px);
    }
    body::after {
      content: "";
      position: fixed;
      bottom: -220px;
      left: -160px;
      width: 460px;
      height: 460px;
      background: radial-gradient(circle, rgba(200, 182, 226, 0.45) 0%, rgba(200, 182, 226, 0) 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(8px);
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 18px 64px;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      margin-bottom: 28px;
      color: var(--ink);
    }
    .header h1 {
      font-family: "Fraunces", "Pretendard Variable", serif;
      font-size: 32px;
      font-weight: 600;
      font-style: italic;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 8px;
      line-height: 1.15;
    }
    .header h1::first-letter { color: var(--blush-deep); }
    .header p {
      font-size: 13px;
      color: var(--ink-muted);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* ===== Day Tabs ===== */
    .day-nav-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .day-arrow {
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--ink-soft);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--sh-sm);
      transition: transform 0.2s var(--ease), background 0.2s ease, color 0.2s, border-color 0.2s;
      padding: 0;
      padding-bottom: 3px;
    }
    .day-arrow:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.05);
      background: var(--blush-soft);
      border-color: var(--blush);
      color: var(--blush-deep);
    }
    .day-arrow:active:not(:disabled) { transform: scale(0.95); }
    .day-arrow:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .day-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 16px;
      scrollbar-width: none;
      flex: 1;
      min-width: 0;
      scroll-behavior: smooth;
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex: 0 0 auto;
      padding: 11px 20px;
      border-radius: var(--r-pill);
      background: var(--surface);
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 13.5px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: transform 0.25s var(--ease), background 0.2s ease, box-shadow 0.3s var(--ease), border-color 0.2s;
      white-space: nowrap;
      box-shadow: var(--sh-sm);
    }
    .day-tab:hover {
      transform: translateY(-2px);
      border-color: var(--blush);
      color: var(--blush-deep);
    }
    .day-tab.active {
      background: var(--ink);
      color: var(--cream);
      border-color: var(--ink);
      box-shadow: var(--sh-md);
      transform: translateY(-1px);
    }
    .day-tab .day-done {
      display: inline-block;
      margin-left: 6px;
      font-size: 11px;
      opacity: 0.75;
      font-weight: 500;
    }

    /* ===== Progress ===== */
    .progress-wrap {
      background: var(--cream-deep);
      border-radius: var(--r-pill);
      height: 12px;
      overflow: hidden;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--blush) 0%, var(--peach) 50%, var(--butter) 100%);
      border-radius: var(--r-pill);
      transition: width 0.6s var(--ease-out);
      position: relative;
    }
    .progress-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
      border-radius: inherit;
      animation: shimmer 2.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { transform: translateX(-100%); opacity: 0; }
      50% { transform: translateX(100%); opacity: 1; }
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }
    .progress-info span:last-child {
      color: var(--blush-deep);
      font-weight: 700;
    }

    /* ===== Flashcard — 앱의 주인공 ===== */
    .card-wrap {
      perspective: 1800px;
      margin-bottom: 24px;
    }
    .card {
      position: relative;
      width: 100%;
      min-height: 380px;
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--r-xl);
      padding: 34px 28px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: var(--sh-xl);
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-face::before {
      content: "";
      position: absolute;
      top: -50%;
      right: -30%;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 228, 225, 0.7) 0%, rgba(255, 228, 225, 0) 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card-face::after {
      content: "";
      position: absolute;
      bottom: -40%;
      left: -30%;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(230, 220, 243, 0.6) 0%, rgba(230, 220, 243, 0) 70%);
      pointer-events: none;
      z-index: 0;
    }
    .card-face > * { position: relative; z-index: 1; }
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(160deg, #FDFBF7 0%, #F7F2EA 100%);
      justify-content: flex-start;
      align-items: stretch;
      padding: 32px 26px;
    }

    /* Front */
    .emoji-row {
      font-size: 48px;
      letter-spacing: 6px;
      margin-bottom: 22px;
      line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(232, 165, 165, 0.25));
    }
    .word-text {
      font-family: "Fraunces", "Pretendard Variable", serif;
      font-size: 44px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.03em;
      margin-bottom: 14px;
      text-align: center;
      line-height: 1.1;
    }
    .pos-badge {
      display: inline-block;
      padding: 5px 16px;
      background: var(--lavender-soft);
      color: #6B5B8E;
      font-size: 11.5px;
      font-weight: 700;
      border-radius: var(--r-pill);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
      border: 1px solid rgba(200, 182, 226, 0.5);
    }
    .flip-hint {
      position: absolute;
      bottom: 22px;
      font-size: 10.5px;
      color: var(--ink-faint);
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
      z-index: 2;
    }

    /* Back */
    .back-word {
      font-family: "Fraunces", serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--ink);
      text-align: center;
      margin-bottom: 4px;
      font-style: italic;
    }
    .back-meaning {
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blush) 30%, var(--lavender) 70%, transparent);
      margin: 6px 0 18px;
    }
    .example-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--blush-deep);
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .speaker-btn.example-speaker {
      width: 26px;
      height: 26px;
      font-size: 12px;
      margin-left: 2px;
    }

    /* ===== Review banner ===== */
    .review-banner {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 5px 14px;
      background: linear-gradient(135deg, #C8B6E2, #A78BFA);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.5px;
      border-radius: var(--r-pill);
      box-shadow: 0 4px 12px rgba(167, 139, 250, 0.4);
      z-index: 2;
      white-space: nowrap;
    }

    /* ===== Speaker button ===== */
    .speaker-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      margin-left: 6px;
      border: none;
      background: var(--blush-soft);
      color: var(--blush-deep);
      border-radius: 50%;
      font-size: 15px;
      cursor: pointer;
      vertical-align: middle;
      box-shadow: 0 2px 8px rgba(244, 194, 194, 0.35);
      transition: transform 0.18s var(--ease), background 0.2s;
      padding: 0;
    }
    .speaker-btn:hover { transform: scale(1.1); background: var(--blush); color: #fff; }
    .speaker-btn:active { transform: scale(0.92); }

    /* ===== Meaning list (multi-meaning) ===== */
    .meaning-list {
      list-style: decimal inside;
      padding: 0;
      margin: 0 auto 22px;
      max-width: 340px;
      text-align: left;
    }
    .meaning-list .meaning-item {
      padding: 4px 0;
      font-size: 16px;
      color: var(--ink);
      line-height: 1.55;
      font-weight: 600;
    }
    .meaning-item.single {
      text-align: center;
      font-family: "Fraunces", "Pretendard Variable", serif;
      font-weight: 700;
      font-size: 26px;
      margin-bottom: 22px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .meaning-item .m-pos {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      color: var(--blush-deep);
      background: var(--blush-soft);
      padding: 2px 8px;
      border-radius: var(--r-pill);
      margin-right: 8px;
      vertical-align: middle;
      letter-spacing: 0.5px;
    }
    .meaning-item .m-kr {
      color: var(--ink);
      font-weight: 600;
    }
    .meaning-item.single .m-pos { display: none; }
    .meaning-item.single .m-kr { font-size: 26px; }

    /* ===== Clickable example words ===== */
    .ex-word {
      cursor: pointer;
      border-bottom: 1.5px dotted transparent;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
      padding: 0 1px;
      border-radius: 3px;
    }
    .ex-word.known {
      border-bottom-color: var(--lavender);
      color: #6B5B8E;
      font-weight: 500;
    }
    .ex-word:hover {
      background: var(--blush-soft);
      color: var(--blush-deep);
      border-bottom-color: var(--blush-deep);
    }

    /* ===== Word Popup ===== */
    .popup-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(45, 42, 50, 0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .popup-backdrop.show { opacity: 1; pointer-events: auto; }
    .word-popup {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -48%) scale(0.94);
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 26px 26px 22px;
      box-shadow: var(--sh-xl);
      z-index: 1001;
      min-width: 300px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      border: 1px solid var(--border);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.35s var(--ease);
    }
    .word-popup.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    .word-popup .wp-close {
      position: absolute;
      top: 10px;
      right: 12px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 50%;
    }
    .word-popup .wp-close:hover { background: var(--cream-deep); color: var(--ink); }
    .word-popup .wp-word {
      font-family: "Fraunces", serif;
      font-style: italic;
      font-size: 32px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
      padding-right: 24px;
    }
    .word-popup .wp-day {
      font-size: 11px;
      font-weight: 700;
      color: var(--blush-deep);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .word-popup .meaning-list {
      margin: 0 0 14px;
      padding: 0 0 0 4px;
    }
    .word-popup .meaning-item { font-size: 15px; padding: 5px 0; }
    .word-popup .wp-saved {
      font-size: 12px;
      color: #6FA07A;
      background: #E8F0E3;
      padding: 8px 12px;
      border-radius: var(--r-md);
      font-weight: 700;
      text-align: center;
    }
    .word-popup .wp-external {
      font-size: 13px;
      text-align: center;
      margin-top: 4px;
    }
    .word-popup .wp-external a {
      color: var(--blush-deep);
      text-decoration: none;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: var(--r-pill);
      background: var(--blush-soft);
      display: inline-block;
    }
    .word-popup .wp-stem-note {
      font-size: 13px;
      color: var(--ink-muted);
      font-weight: 400;
      font-style: normal;
      margin-left: 4px;
    }
    .word-popup .wp-dict-meaning {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
      padding: 16px 12px;
      background: var(--cream-deep);
      border-radius: var(--r-md);
      margin: 8px 0 12px;
      line-height: 1.55;
    }
    .word-popup .wp-save-row {
      text-align: center;
      margin-top: 12px;
    }
    .word-popup .wp-save-btn {
      display: inline-block;
      padding: 10px 24px;
      border: none;
      border-radius: var(--r-pill);
      background: linear-gradient(135deg, var(--blush), var(--blush-deep));
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(232, 165, 165, 0.4);
      transition: transform 0.18s var(--ease), filter 0.2s;
    }
    .word-popup .wp-save-btn:hover { filter: brightness(1.06); transform: translateY(-1px); }
    .word-popup .wp-save-btn:active { transform: scale(0.97); }
    .scene-illust {
      position: relative;
      height: 96px;
      margin-bottom: 14px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 228, 225, 0.85) 0%, rgba(255, 228, 225, 0) 60%),
        radial-gradient(circle at 80% 70%, rgba(230, 220, 243, 0.8) 0%, rgba(230, 220, 243, 0) 60%),
        linear-gradient(135deg, #FFF6F1 0%, #F7F0FB 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(244, 194, 194, 0.3);
      box-shadow: inset 0 2px 8px rgba(255, 228, 225, 0.4);
    }
    .scene-illust::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 14px;
      font-size: 9px;
      letter-spacing: 1.4px;
      color: var(--blush-deep);
      font-weight: 800;
      text-transform: uppercase;
      opacity: 0.75;
    }
    .scene-illust .scene-emoji {
      font-size: 44px;
      line-height: 1;
      letter-spacing: 8px;
      text-align: center;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.08));
      animation: sceneFloat 3.5s ease-in-out infinite;
    }
    @keyframes sceneFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .example-en {
      font-family: "Fraunces", serif;
      font-size: 16px;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 10px;
      font-weight: 400;
    }
    .example-kr {
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.6;
      font-weight: 500;
    }

    /* ===== Action Buttons ===== */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .btn-action {
      padding: 18px;
      border: none;
      border-radius: var(--r-lg);
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s var(--ease), box-shadow 0.3s var(--ease), filter 0.2s;
      color: var(--ink);
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    .btn-action:active { transform: scale(0.96); }
    .btn-known {
      background: linear-gradient(160deg, #D9E5CE 0%, #B5C9A8 100%);
      box-shadow: var(--sh-glow-sage);
      color: #3B5742;
    }
    .btn-known:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(111, 160, 122, 0.32);
    }
    .btn-review {
      background: linear-gradient(160deg, #FFE4E1 0%, #F4C2C2 100%);
      box-shadow: var(--sh-glow-blush);
      color: #7A3F3F;
    }
    .btn-review:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(232, 165, 165, 0.36);
    }

    /* ===== Nav Buttons ===== */
    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .btn-nav {
      flex: 1;
      padding: 13px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--r-md);
      background: var(--surface);
      color: var(--ink-soft);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.25s var(--ease);
      font-family: inherit;
      box-shadow: var(--sh-sm);
    }
    .btn-nav:hover:not(:disabled) {
      background: var(--cream);
      border-color: var(--blush);
      color: var(--blush-deep);
      transform: translateY(-1px);
    }
    .btn-nav:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-reset {
      display: block;
      margin: 20px auto 0;
      padding: 9px 22px;
      background: transparent;
      color: var(--ink-faint);
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-pill);
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-reset:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: var(--danger-bg);
    }

    /* ===== Views ===== */
    .view { display: none; }
    .view.active {
      display: block;
      animation: fadeInUp 0.45s var(--ease-out);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Main Nav Tabs ===== */
    .main-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 8px;
      margin-bottom: 22px;
      scrollbar-width: none;
      background: var(--surface);
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      box-shadow: var(--sh-sm);
    }
    .main-nav::-webkit-scrollbar { display: none; }
    .main-tab {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: var(--r-md);
      background: transparent;
      color: var(--ink-muted);
      font-weight: 600;
      font-size: 12.5px;
      border: none;
      cursor: pointer;
      transition: all 0.25s var(--ease);
      white-space: nowrap;
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    .main-tab:hover {
      background: var(--cream);
      color: var(--ink);
    }
    .main-tab.active {
      background: var(--ink);
      color: var(--cream);
      box-shadow: 0 4px 14px rgba(45, 42, 50, 0.25);
    }

    /* ===== Grammar — Topic Grid ===== */
    .grammar-intro {
      color: var(--ink);
      text-align: center;
      margin-bottom: 22px;
    }
    .grammar-intro h2 {
      font-family: "Fraunces", serif;
      font-size: 26px;
      font-weight: 600;
      font-style: italic;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .grammar-intro p {
      font-size: 13px;
      color: var(--ink-muted);
      font-weight: 500;
      line-height: 1.5;
    }

    .topic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .topic-card {
      background: var(--surface);
      border-radius: var(--r-lg);
      padding: 22px 16px;
      cursor: pointer;
      text-align: center;
      box-shadow: var(--sh-md);
      transition: all 0.3s var(--ease);
      border: 1px solid var(--border);
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .topic-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blush), var(--lavender), var(--sage));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .topic-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--sh-lg);
      border-color: var(--blush);
    }
    .topic-card:hover::before { opacity: 1; }
    .topic-card .t-icon {
      font-size: 38px;
      line-height: 1;
      margin-bottom: 10px;
      filter: drop-shadow(0 3px 6px rgba(200, 182, 226, 0.35));
    }
    .topic-card .t-title {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
      word-break: keep-all;
      letter-spacing: -0.01em;
    }
    .topic-card .t-desc {
      font-size: 11.5px;
      color: var(--ink-muted);
      line-height: 1.45;
      word-break: keep-all;
      font-weight: 500;
    }

    /* ===== Grammar — Level Pickers ===== */
    .level-picker {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .level-card {
      background: var(--surface);
      border-radius: var(--r-lg);
      padding: 20px 22px;
      cursor: pointer;
      box-shadow: var(--sh-md);
      border: 1px solid var(--border);
      text-align: left;
      transition: all 0.3s var(--ease);
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: inherit;
    }
    .level-card:hover {
      transform: translateX(4px);
      box-shadow: var(--sh-lg);
      border-color: var(--border-strong);
    }
    .level-card .l-badge {
      font-family: "Fraunces", serif;
      font-size: 22px;
      font-weight: 600;
      padding: 14px 18px;
      border-radius: var(--r-md);
      color: var(--ink);
      min-width: 60px;
      text-align: center;
      flex-shrink: 0;
      background: var(--cream);
    }
    .level-card.easy .l-badge {
      background: linear-gradient(160deg, var(--sage-soft), var(--sage));
      color: #3B5742;
    }
    .level-card.medium .l-badge {
      background: linear-gradient(160deg, var(--butter-soft), var(--butter));
      color: #7A5F1A;
    }
    .level-card.hard .l-badge {
      background: linear-gradient(160deg, var(--blush-soft), var(--blush));
      color: #7A3F3F;
    }
    .level-card .l-body { flex: 1; min-width: 0; }
    .level-card .l-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .level-card .l-summary {
      font-size: 12.5px;
      color: var(--ink-muted);
      line-height: 1.5;
      font-weight: 500;
    }
    .level-card .l-wrong-count {
      font-size: 10.5px;
      background: var(--blush-soft);
      color: #7A3F3F;
      padding: 3px 10px;
      border-radius: var(--r-pill);
      margin-top: 6px;
      display: inline-block;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ===== Grammar — Rule Cards ===== */
    .rule-section-header {
      color: var(--ink);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 4px 2px;
    }
    .rule-section-header .icon {
      font-size: 36px;
      filter: drop-shadow(0 4px 10px rgba(200, 182, 226, 0.35));
    }
    .rule-section-header h2 {
      font-family: "Fraunces", serif;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .rule-section-header p {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 3px;
      font-weight: 500;
    }
    .rule-card {
      background: var(--surface);
      border-radius: var(--r-lg);
      padding: 22px 22px;
      margin-bottom: 14px;
      box-shadow: var(--sh-md);
      border: 1px solid var(--border);
      transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
    }
    .rule-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--sh-lg);
    }
    .rule-card .r-title {
      font-family: "Fraunces", serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    .rule-card .r-body {
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.7;
      margin-bottom: 14px;
      font-weight: 500;
    }
    .rule-card .r-body b, .rule-card .r-body u {
      color: #6B5B8E;
      font-weight: 700;
      background: linear-gradient(180deg, transparent 60%, var(--lavender-soft) 60%);
      padding: 0 2px;
      text-decoration: none;
    }
    .rule-card .r-example {
      padding: 14px 16px;
      background: var(--cream);
      border-left: 3px solid var(--lavender);
      border-radius: var(--r-sm);
    }
    .rule-card .r-example-en {
      font-family: "Fraunces", serif;
      font-size: 14.5px;
      color: var(--ink);
      line-height: 1.6;
    }
    .rule-card .r-example-en u {
      color: #6B5B8E;
      text-decoration: underline;
      text-decoration-color: var(--lavender);
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      font-weight: 700;
    }
    .rule-card .r-example-kr {
      font-size: 12.5px;
      color: var(--ink-muted);
      margin-top: 6px;
      line-height: 1.55;
      font-weight: 500;
    }

    /* ===== Word Test Menu ===== */
    .day-picker-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .day-picker-card {
      background: var(--surface);
      border-radius: var(--r-lg);
      padding: 22px 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-align: center;
      box-shadow: var(--sh-md);
      transition: all 0.3s var(--ease);
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .day-picker-card:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: var(--sh-lg);
      border-color: var(--blush);
    }
    .day-picker-card:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--cream);
    }
    .day-picker-card .dp-day {
      font-family: "Fraunces", serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .day-picker-card .dp-status {
      font-size: 11.5px;
      color: var(--ink-muted);
      margin-top: 4px;
      font-weight: 500;
    }
    .day-picker-card.ready {
      background: linear-gradient(160deg, #FFFFFF 0%, #F7F9F4 100%);
      border-color: var(--sage);
    }
    .day-picker-card.ready .dp-status {
      color: var(--success);
      font-weight: 700;
    }
    .day-picker-card.ready::before {
      content: "";
      position: absolute;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sage);
      box-shadow: 0 0 0 4px rgba(181, 201, 168, 0.25);
    }

    /* ===== Notes sub-tabs ===== */
    .notes-subtabs {
      display: flex;
      gap: 8px;
      background: var(--surface);
      padding: 6px;
      border-radius: var(--r-pill);
      box-shadow: var(--sh-md);
      margin-bottom: 18px;
      border: 1px solid var(--border);
    }
    .notes-subtab {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 700;
      border-radius: var(--r-pill);
      cursor: pointer;
      transition: all 0.25s var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .notes-subtab:hover:not(.active) {
      background: var(--blush-soft);
      color: var(--blush-deep);
    }
    .notes-subtab.active {
      background: var(--ink);
      color: var(--cream);
      box-shadow: var(--sh-sm);
    }
    .notes-subtab .count-pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      background: var(--cream-deep);
      color: var(--ink-muted);
      min-width: 22px;
    }
    .notes-subtab.active .count-pill {
      background: rgba(253, 251, 247, 0.2);
      color: var(--cream);
    }

    /* ===== Notes section dividers ===== */
    .notes-section {
      margin-bottom: 26px;
    }
    .notes-section-title {
      color: var(--ink);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
    }
    .notes-section-title .count {
      font-size: 11px;
      background: var(--blush-soft);
      color: var(--blush-deep);
      padding: 3px 11px;
      border-radius: var(--r-pill);
      font-weight: 700;
    }
    .grammar-note-card {
      background: var(--surface);
      border-radius: var(--r-md);
      padding: 18px 20px;
      margin-bottom: 10px;
      box-shadow: var(--sh-sm);
      border: 1px solid var(--border);
      position: relative;
      transition: all 0.25s var(--ease);
    }
    .grammar-note-card:hover {
      box-shadow: var(--sh-md);
      transform: translateY(-1px);
    }
    .grammar-note-card .gn-topic {
      font-size: 11px;
      background: var(--lavender-soft);
      color: #6B5B8E;
      padding: 4px 11px;
      border-radius: var(--r-pill);
      font-weight: 700;
      display: inline-block;
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }
    .grammar-note-card .gn-q {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .grammar-note-card .gn-answer {
      font-size: 13px;
      color: #3B5742;
      background: var(--success-bg);
      padding: 10px 14px;
      border-radius: var(--r-sm);
      border-left: 3px solid var(--sage);
      font-weight: 500;
      line-height: 1.55;
    }
    .grammar-note-card .gn-remove {
      position: absolute;
      top: 12px;
      right: 14px;
      background: var(--cream);
      border: 1px solid var(--border);
      color: var(--ink-faint);
      cursor: pointer;
      font-size: 13px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .grammar-note-card .gn-remove:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: var(--danger-bg);
    }

    /* Weak topics analysis */
    .weak-analysis {
      text-align: left;
      padding: 16px 18px;
      background: var(--butter-soft);
      border-radius: var(--r-md);
      margin-top: 16px;
      border-left: 3px solid var(--butter);
    }
    .weak-analysis h4 {
      font-size: 13px;
      color: #7A5F1A;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .weak-analysis ul {
      list-style: none;
      font-size: 13px;
      color: #8A6C2E;
    }
    .weak-analysis li { padding: 3px 0; font-weight: 500; }

    /* Back chip for grammar navigation */
    .back-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: var(--surface);
      color: var(--ink-soft);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 18px;
      box-shadow: var(--sh-sm);
      transition: all 0.25s var(--ease);
      font-family: inherit;
    }
    .back-chip:hover {
      transform: translateX(-2px);
      border-color: var(--blush);
      color: var(--blush-deep);
    }

    .btn-big {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 18px;
      border: none;
      border-radius: var(--r-lg);
      background: linear-gradient(160deg, var(--butter-soft) 0%, var(--butter) 100%);
      color: #7A5F1A;
      font-size: 15.5px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(255, 244, 181, 0.55), 0 4px 12px rgba(184, 154, 127, 0.15);
      transition: all 0.3s var(--ease);
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    .btn-big:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(255, 244, 181, 0.7), 0 6px 18px rgba(184, 154, 127, 0.2);
    }

    /* ===== Top nav buttons ===== */
    .top-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .btn-top {
      padding: 10px 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink-soft);
      font-size: 12.5px;
      font-weight: 600;
      border-radius: var(--r-pill);
      cursor: pointer;
      transition: all 0.25s var(--ease);
      font-family: inherit;
      box-shadow: var(--sh-sm);
    }
    .btn-top:hover {
      border-color: var(--blush);
      color: var(--blush-deep);
      transform: translateY(-1px);
    }
    .btn-top.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
      box-shadow: 0 6px 18px rgba(45, 42, 50, 0.25);
    }
    .btn-top.primary:hover {
      background: var(--ink-soft);
      border-color: var(--ink-soft);
      color: var(--cream);
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(45, 42, 50, 0.3);
    }
    .btn-top:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ===== Test View ===== */
    .test-header {
      color: var(--ink);
      text-align: center;
      margin-bottom: 22px;
    }
    .test-header h2 {
      font-family: "Fraunces", serif;
      font-size: 24px;
      font-weight: 600;
      font-style: italic;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .test-header .qnum {
      font-size: 13px;
      color: var(--ink-muted);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .question-card {
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 30px 26px;
      box-shadow: var(--sh-lg);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .q-type-badge {
      display: inline-block;
      padding: 5px 14px;
      background: var(--lavender-soft);
      color: #6B5B8E;
      font-size: 10.5px;
      font-weight: 800;
      border-radius: var(--r-pill);
      letter-spacing: 0.08em;
      margin-bottom: 18px;
      text-transform: uppercase;
      border: 1px solid rgba(200, 182, 226, 0.5);
    }
    .q-prompt {
      font-size: 13.5px;
      color: var(--ink-muted);
      margin-bottom: 10px;
      font-weight: 500;
    }
    .q-text {
      font-family: "Fraunces", serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 26px;
      line-height: 1.3;
      word-break: keep-all;
      letter-spacing: -0.02em;
    }
    .q-text.sentence {
      font-family: "Fraunces", serif;
      font-size: 19px;
      color: var(--ink);
      line-height: 1.7;
      font-weight: 400;
    }
    .q-text.sentence .blank {
      display: inline-block;
      min-width: 86px;
      border-bottom: 2.5px solid var(--blush-deep);
      padding: 0 8px;
      color: var(--blush-deep);
      font-weight: 600;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .choice {
      padding: 16px 20px;
      background: var(--surface-tint);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-size: 14.5px;
      font-weight: 600;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      transition: all 0.25s var(--ease);
      position: relative;
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    .choice:hover:not(:disabled) {
      border-color: var(--blush);
      background: var(--blush-soft);
      transform: translateX(3px);
      box-shadow: var(--sh-sm);
    }
    .choice:disabled { cursor: not-allowed; }
    .choice .letter {
      display: inline-block;
      width: 26px;
      height: 26px;
      line-height: 24px;
      border: 1.5px solid var(--border-strong);
      border-radius: 50%;
      text-align: center;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--ink-muted);
      margin-right: 12px;
      background: var(--surface);
      transition: all 0.25s;
    }
    .choice.wrong {
      background: var(--danger-bg);
      border-color: var(--danger);
      color: #7A3F3F;
      animation: shake 0.4s;
    }
    .choice.wrong .letter {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--surface);
    }
    .choice.wrong-muted {
      opacity: 0.5;
      background: var(--danger-bg);
      border-color: rgba(212, 115, 115, 0.3);
      color: #7A3F3F;
      text-decoration: line-through;
    }
    .choice.correct {
      background: var(--success-bg);
      border-color: var(--success);
      color: #3B5742;
      box-shadow: 0 0 0 4px rgba(111, 160, 122, 0.15), var(--sh-md);
      animation: pop 0.5s var(--ease-out);
    }
    .choice.correct .letter {
      background: var(--success);
      color: var(--surface);
      border-color: var(--success);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .feedback-box {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: var(--r-md);
      font-size: 13.5px;
      line-height: 1.6;
      display: none;
    }
    .feedback-box.show { display: block; animation: fadeInUp 0.4s var(--ease-out); }
    .feedback-box.wrong {
      background: var(--danger-bg);
      border-left: 4px solid var(--danger);
      color: #7A3F3F;
    }
    .feedback-box.correct {
      background: var(--success-bg);
      border-left: 4px solid var(--success);
      color: #3B5742;
    }
    .feedback-box .fb-title {
      font-weight: 700;
      margin-bottom: 5px;
      font-size: 14px;
      letter-spacing: -0.01em;
    }
    .feedback-box .fb-body {
      font-weight: 500;
    }

    .test-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .test-actions button {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: var(--r-md);
      font-size: 14.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    .btn-retry {
      background: linear-gradient(160deg, var(--butter-soft), var(--butter));
      color: #7A5F1A;
      box-shadow: 0 8px 22px rgba(255, 244, 181, 0.55);
    }
    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 244, 181, 0.7);
    }
    .btn-next-q {
      background: var(--ink);
      color: var(--cream);
      box-shadow: 0 8px 22px rgba(45, 42, 50, 0.22);
    }
    .btn-next-q:hover {
      background: var(--ink-soft);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(45, 42, 50, 0.3);
    }

    /* Celebration flash */
    .celebrate {
      text-align: center;
      font-size: 46px;
      margin: 10px 0 6px;
      animation: celebrate 0.8s var(--ease-out);
    }
    @keyframes celebrate {
      0% { transform: scale(0.5) rotate(-20deg); opacity: 0; }
      50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); }
    }

    /* ===== Result view ===== */
    .result-card {
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 38px 28px;
      box-shadow: var(--sh-xl);
      border: 1px solid var(--border);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--blush), var(--peach), var(--butter), var(--sage), var(--lavender));
    }
    .result-emoji {
      font-size: 72px;
      margin-bottom: 14px;
      filter: drop-shadow(0 8px 20px rgba(232, 165, 165, 0.4));
      animation: celebrate 0.9s var(--ease-out);
    }
    .result-title {
      font-family: "Fraunces", serif;
      font-size: 26px;
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .result-score {
      font-family: "Fraunces", serif;
      font-size: 68px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--blush-deep) 0%, #B89EC8 60%, var(--mocha) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 18px 0 6px;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .result-sub {
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 22px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .result-msg {
      font-size: 14.5px;
      color: var(--ink-soft);
      padding: 16px 18px;
      background: var(--cream);
      border-radius: var(--r-md);
      margin-bottom: 20px;
      font-weight: 500;
      line-height: 1.55;
      border: 1px solid var(--border);
    }
    .wrong-list {
      text-align: left;
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px dashed var(--border-strong);
    }
    .wrong-list h3 {
      font-size: 12px;
      color: var(--ink-muted);
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .wrong-item {
      padding: 12px 14px;
      background: var(--danger-bg);
      border-left: 3px solid var(--danger);
      border-radius: var(--r-sm);
      margin-bottom: 8px;
      font-size: 13.5px;
      line-height: 1.5;
    }
    .wrong-item b {
      color: #7A3F3F;
      font-weight: 700;
    }
    .wrong-item span {
      color: var(--ink-muted);
      margin-left: 6px;
      font-weight: 500;
    }
    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 22px;
    }
    .result-actions button {
      padding: 15px;
      border: none;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    .btn-home {
      background: var(--ink);
      color: var(--cream);
      box-shadow: 0 8px 22px rgba(45, 42, 50, 0.22);
    }
    .btn-home:hover {
      background: var(--ink-soft);
      transform: translateY(-2px);
    }
    .btn-retest {
      background: linear-gradient(160deg, var(--sage-soft), var(--sage));
      color: #3B5742;
      box-shadow: var(--sh-glow-sage);
    }
    .btn-retest:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(111, 160, 122, 0.32);
    }

    /* ===== Wrong notes view ===== */
    .notes-header {
      color: var(--ink);
      text-align: center;
      margin-bottom: 22px;
    }
    .notes-header h2 {
      font-family: "Fraunces", serif;
      font-size: 28px;
      font-weight: 600;
      font-style: italic;
      letter-spacing: -0.02em;
    }
    .notes-header p {
      font-size: 13px;
      color: var(--ink-muted);
      margin-top: 6px;
      font-weight: 500;
    }
    .notes-empty {
      background: var(--surface);
      border-radius: var(--r-xl);
      padding: 50px 26px;
      text-align: center;
      color: var(--ink-muted);
      font-size: 14.5px;
      font-weight: 500;
      box-shadow: var(--sh-md);
      border: 1px solid var(--border);
    }
    .notes-empty .big {
      font-size: 56px;
      margin-bottom: 14px;
      filter: drop-shadow(0 6px 14px rgba(200, 182, 226, 0.35));
    }
    .note-card {
      background: var(--surface);
      border-radius: var(--r-md);
      padding: 18px 20px;
      margin-bottom: 10px;
      box-shadow: var(--sh-sm);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.25s var(--ease);
    }
    .note-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--sh-md);
      border-color: var(--border-strong);
    }
    .note-card .emoji {
      font-size: 30px;
      flex-shrink: 0;
      filter: drop-shadow(0 3px 6px rgba(232, 165, 165, 0.3));
    }
    .note-card .content { flex: 1; min-width: 0; }
    .note-card .word {
      font-family: "Fraunces", serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 3px;
      letter-spacing: -0.01em;
    }
    .note-card .meaning {
      font-size: 12.5px;
      color: var(--ink-muted);
      font-weight: 500;
    }
    .note-card .day-tag {
      font-size: 10px;
      background: var(--lavender-soft);
      color: #6B5B8E;
      padding: 4px 10px;
      border-radius: var(--r-pill);
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .note-card button {
      background: var(--cream);
      border: 1px solid var(--border);
      color: var(--ink-faint);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .note-card button:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: var(--danger-bg);
    }

    /* ===== Grammar Test Menu inline-style overrides ===== */
    /* JS renders this as inline styles; we soften it visually */
    #grammarTestContent .rule-card b {
      font-family: "Fraunces", serif;
      color: var(--ink) !important;
      font-weight: 600 !important;
      font-size: 16px !important;
      letter-spacing: -0.01em;
    }
    #grammarTestContent .rule-card button {
      font-family: inherit !important;
      border-radius: var(--r-md) !important;
      transition: all 0.25s var(--ease);
      letter-spacing: -0.01em;
    }
    #grammarTestContent .rule-card button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05) saturate(0.9);
    }
    /* Override the hard HSL buttons from inline styles with pastels */
    #grammarTestContent .rule-card button[onclick*="'easy'"] {
      background: linear-gradient(160deg, var(--sage-soft), var(--sage)) !important;
      color: #3B5742 !important;
      box-shadow: var(--sh-sm);
    }
    #grammarTestContent .rule-card button[onclick*="'medium'"] {
      background: linear-gradient(160deg, var(--butter-soft), var(--butter)) !important;
      color: #7A5F1A !important;
      box-shadow: var(--sh-sm);
    }
    #grammarTestContent .rule-card button[onclick*="'hard'"] {
      background: linear-gradient(160deg, var(--blush-soft), var(--blush)) !important;
      color: #7A3F3F !important;
      box-shadow: var(--sh-sm);
    }

    /* ===== Selection + focus ===== */
    ::selection {
      background: var(--blush);
      color: var(--ink);
    }
    button:focus-visible,
    .card:focus-visible {
      outline: 2.5px solid var(--blush-deep);
      outline-offset: 3px;
      border-radius: var(--r-md);
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .app { padding: 22px 14px 48px; }
      .header h1 { font-size: 26px; }
      .word-text { font-size: 36px; }
      .emoji-row { font-size: 40px; }
      .card-face { padding: 28px 22px; }
      .card { min-height: 360px; }
      .day-tab { padding: 10px 16px; font-size: 13px; }
      .btn-action { padding: 16px; font-size: 14px; }
      .q-text { font-size: 26px; }
      .q-text.sentence { font-size: 17px; }
      .result-score { font-size: 54px; }
      .result-emoji { font-size: 58px; }
      .result-card { padding: 32px 22px; }
      .main-tab { padding: 10px 13px; font-size: 12px; }
      .topic-grid { grid-template-columns: 1fr 1fr; }
      .topic-card { padding: 18px 12px; }
      .topic-card .t-icon { font-size: 32px; }
      .topic-card .t-title { font-size: 13px; }
      .day-picker-grid { grid-template-columns: 1fr 1fr; }
      .day-picker-card { padding: 18px 12px; }
      .day-picker-card .dp-day { font-size: 22px; }
      .grammar-intro h2 { font-size: 22px; }
      .rule-card { padding: 18px 18px; }
      .level-card { padding: 16px 18px; }
    }

    @media (max-width: 360px) {
      .topic-grid { grid-template-columns: 1fr; }
      .word-text { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Toeic, softly.</h1>
      <p>단어 · 어법 · 오답노트 &nbsp;·&nbsp; 900 → 950 심화하기</p>
    </div>

    <!-- ============ MAIN NAV ============ -->
    <nav class="main-nav" id="mainNav">
      <button class="main-tab active" data-view="viewWordStudy" onclick="switchTab('viewWordStudy')">📚 단어 학습</button>
      <button class="main-tab" data-view="viewWordTest" onclick="switchTab('viewWordTest')">📝 단어 테스트</button>
      <button class="main-tab" data-view="viewGrammarStudy" onclick="switchTab('viewGrammarStudy')">📖 어법 학습</button>
      <button class="main-tab" data-view="viewGrammarTest" onclick="switchTab('viewGrammarTest')">✍️ 어법 테스트</button>
      <button class="main-tab" data-view="viewNotes" onclick="switchTab('viewNotes')">📋 오답노트</button>
    </nav>

    <!-- ============ WORD STUDY VIEW ============ -->
    <div class="view active" id="viewWordStudy">
      <div class="day-nav-row">
        <button class="day-arrow" id="dayArrowPrev" onclick="shiftDay(-1)" aria-label="이전 Day">‹</button>
        <div class="day-tabs" id="dayTabs"></div>
        <button class="day-arrow" id="dayArrowNext" onclick="shiftDay(1)" aria-label="다음 Day">›</button>
      </div>

      <div class="progress-info">
        <span id="progressText">0 / 30</span>
        <span id="percentText">0%</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>

      <div class="top-nav" style="margin-top:18px;">
        <button class="btn-top primary" id="btnStartTest" onclick="startCurrentDayTest()">📝 이 Day 테스트 보기</button>
      </div>

      <div class="card-wrap">
        <div class="card" id="card" onclick="toggleFlip()">
          <div class="card-face card-front">
            <div class="review-banner" id="reviewBanner" style="display:none;"></div>
            <div class="emoji-row" id="emojiRow">📚</div>
            <div class="word-text" id="wordText">Loading...</div>
            <div class="pos-badge" id="posBadge">명사</div>
            <div class="flip-hint">TAP TO FLIP ↻</div>
          </div>
          <div class="card-face card-back">
            <div class="back-word" id="backWord"></div>
            <div class="back-meaning" id="backMeaning"></div>
            <div class="divider"></div>
            <div class="example-label" id="exampleLabel">📝 EXAMPLE</div>
            <div class="scene-illust" id="sceneIllust"></div>
            <div class="example-en" id="exampleEn"></div>
            <div class="example-kr" id="exampleKr"></div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-action btn-review" onclick="markWord(false)">다시 볼게요 🔄</button>
        <button class="btn-action btn-known" onclick="markWord(true)">외웠어요 ✅</button>
      </div>

      <div class="nav-row">
        <button class="btn-nav" id="prevBtn" onclick="navigate(-1)">← 이전</button>
        <button class="btn-nav" id="nextBtn" onclick="navigate(1)">다음 →</button>
      </div>

      <button class="btn-reset" onclick="resetDay()">이 Day 진도 초기화</button>
    </div>

    <!-- ============ WORD TEST MENU ============ -->
    <div class="view" id="viewWordTest">
      <div class="grammar-intro">
        <h2>📝 단어 테스트</h2>
        <p>테스트할 Day를 선택하세요. 30단어를 모두 학습한 Day만 활성화됩니다.</p>
      </div>
      <div class="day-picker-grid" id="wordTestDayPicker"></div>
    </div>

    <!-- ============ GRAMMAR STUDY ============ -->
    <div class="view" id="viewGrammarStudy">
      <div id="grammarStudyContent"></div>
    </div>

    <!-- ============ GRAMMAR TEST MENU ============ -->
    <div class="view" id="viewGrammarTest">
      <div id="grammarTestContent"></div>
    </div>

    <!-- ============ TEST VIEW ============ -->
    <div class="view" id="viewTest">
      <div class="test-header">
        <h2 id="testTitle">Day 1 단어 테스트</h2>
        <div class="qnum" id="testQnum">1 / 15</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="testProgressBar" style="width:0%"></div>
      </div>
      <div style="height: 20px;"></div>

      <div class="question-card" id="questionCard">
        <!-- filled dynamically -->
      </div>

      <div class="top-nav" style="margin-top:4px;">
        <button class="btn-top" onclick="exitTest()">← 학습 화면으로</button>
      </div>
    </div>

    <!-- ============ RESULT VIEW ============ -->
    <div class="view" id="viewResult">
      <div class="result-card" id="resultCard">
        <!-- filled dynamically -->
      </div>
    </div>

    <!-- ============ WRONG NOTES VIEW ============ -->
    <div class="view" id="viewNotes">
      <div class="notes-header">
        <h2>📕 오답노트</h2>
        <p>단어 · 어법 오답을 한눈에 복습하세요</p>
      </div>
      <div id="notesList"></div>
      <div class="top-nav" style="margin-top:14px;">
        <button class="btn-top" onclick="clearAllNotes()">🗑️ 전체 지우기</button>
      </div>
    </div>
  </div>

  <!-- Word meaning popup (example word click) -->
  <div class="popup-backdrop" id="popupBackdrop" onclick="closeWordPopup()"></div>
  <div class="word-popup" id="wordPopup" role="dialog" aria-label="단어 뜻"></div>

  <script src="words.js"></script>
  <script src="meanings-overlay.js"></script>
  <script src="inline-dict.js"></script>
  <script src="grammar.js"></script>
  <script>
    // ===== State =====
    const STORAGE_KEY = "toeic950_progress_v1";
    const NOTES_KEY = "toeic950_wrongnotes_v1";
    const GRAMMAR_NOTES_KEY = "toeic950_grammar_notes_v1";
    const TOTAL_DAYS = 30;
    const WORDS_PER_DAY = 50;
    let currentDay = 1;
    let currentIndex = 0;

    // Review mode (kicks in when day's words all seen and some marked "다시 볼게요")
    let reviewMode = false;
    let reviewQueue = []; // shuffled array of word objects to re-show

    // Current example sentence (for speaker button)
    let currentExampleSentence = "";

    // Merge meanings overlay + build fast lookup by lowercase word
    const WORD_LOOKUP = {};
    (function initWordData() {
      const overlay = (typeof MEANINGS_OVERLAY !== 'undefined') ? MEANINGS_OVERLAY : {};
      TOEIC_WORDS.forEach(w => {
        if (!w.meanings || !Array.isArray(w.meanings)) {
          w.meanings = overlay[w.word] || [{ pos: w.partOfSpeech, kr: w.meaning }];
        }
        WORD_LOOKUP[w.word.toLowerCase()] = w;
      });
    })();

    // 어법 학습 화면 상태
    let grammarNav = { topic: null, level: null };

    // progress: { "word": true/false } — true=외웠음
    let progress = loadProgress();
    // wrongNotes: { "word": true } — 단어 오답노트
    let wrongNotes = loadNotes();
    // grammarNotes: [{ topicId, level, q, choices, explanation, savedAt }]
    let grammarNotes = loadGrammarNotes();

    function loadProgress() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; }
    }
    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }
    function loadNotes() {
      try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; } catch (e) { return {}; }
    }
    function saveNotes() {
      localStorage.setItem(NOTES_KEY, JSON.stringify(wrongNotes));
    }
    function loadGrammarNotes() {
      try { return JSON.parse(localStorage.getItem(GRAMMAR_NOTES_KEY)) || []; } catch (e) { return []; }
    }
    function saveGrammarNotes() {
      localStorage.setItem(GRAMMAR_NOTES_KEY, JSON.stringify(grammarNotes));
    }

    // ===== Helpers =====
    function wordsOfDay(day) {
      return TOEIC_WORDS.filter(w => w.day === day);
    }
    function dayCompletedCount(day) {
      return wordsOfDay(day).filter(w => progress[w.word] === true).length;
    }

    // ===== Render Day Tabs =====
    function renderDayTabs() {
      const container = document.getElementById("dayTabs");
      container.innerHTML = "";
      for (let d = 1; d <= TOTAL_DAYS; d++) {
        const btn = document.createElement("button");
        btn.className = "day-tab" + (d === currentDay ? " active" : "");
        const done = dayCompletedCount(d);
        const total = wordsOfDay(d).length;
        btn.innerHTML = `Day ${d}<span class="day-done">${done}/${total}</span>`;
        btn.onclick = () => selectDay(d);
        container.appendChild(btn);
      }
    }

    function selectDay(day) {
      if (day < 1 || day > TOTAL_DAYS) return;
      currentDay = day;
      currentIndex = 0;
      reviewMode = false;
      reviewQueue = [];
      document.getElementById("card").classList.remove("flipped");
      renderDayTabs();
      renderCard();
      renderProgress();
      scrollActiveDayTabIntoView();
      updateDayArrows();
    }

    function shiftDay(delta) {
      const next = currentDay + delta;
      if (next < 1 || next > TOTAL_DAYS) return;
      selectDay(next);
    }

    function scrollActiveDayTabIntoView() {
      const container = document.getElementById("dayTabs");
      if (!container) return;
      const active = container.querySelector(".day-tab.active");
      if (!active) return;
      const cLeft = container.scrollLeft;
      const cRight = cLeft + container.clientWidth;
      const aLeft = active.offsetLeft;
      const aRight = aLeft + active.offsetWidth;
      if (aLeft < cLeft + 20 || aRight > cRight - 20) {
        container.scrollTo({
          left: aLeft - container.clientWidth / 2 + active.offsetWidth / 2,
          behavior: "smooth"
        });
      }
    }

    function updateDayArrows() {
      const prev = document.getElementById("dayArrowPrev");
      const next = document.getElementById("dayArrowNext");
      if (prev) prev.disabled = currentDay <= 1;
      if (next) next.disabled = currentDay >= TOTAL_DAYS;
    }

    // ===== Swipe gestures on the flashcard =====
    function setupCardSwipe() {
      const card = document.getElementById("card");
      if (!card) return;
      const wrap = card.parentElement; // .card-wrap
      if (!wrap) return;

      let startX = 0, startY = 0, startTime = 0;
      let tracking = false;
      let moved = false;

      const SWIPE_THRESHOLD = 50;      // px — horizontal distance to count as swipe
      const MAX_VERTICAL = 60;         // px — allow some vertical drift
      const MAX_DURATION = 600;        // ms — must be quick to count as swipe
      const TAP_SLOP = 10;             // px — below this = treated as tap

      function onStart(e) {
        const p = e.touches ? e.touches[0] : e;
        startX = p.clientX;
        startY = p.clientY;
        startTime = Date.now();
        tracking = true;
        moved = false;
      }
      function onMove(e) {
        if (!tracking) return;
        const p = e.touches ? e.touches[0] : e;
        if (Math.abs(p.clientX - startX) > TAP_SLOP || Math.abs(p.clientY - startY) > TAP_SLOP) {
          moved = true;
        }
      }
      function onEnd(e) {
        if (!tracking) return;
        tracking = false;
        const p = (e.changedTouches ? e.changedTouches[0] : e);
        const dx = p.clientX - startX;
        const dy = p.clientY - startY;
        const dt = Date.now() - startTime;

        if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dy) < MAX_VERTICAL && dt < MAX_DURATION) {
          // horizontal swipe → prev/next word
          if (dx < 0) {
            navigate(1);     // swipe left → next
          } else {
            navigate(-1);    // swipe right → prev
          }
          // Prevent the click/tap-to-flip from firing
          e.preventDefault();
          e.stopPropagation();
          blockNextClick();
        }
      }

      wrap.addEventListener("touchstart", onStart, { passive: true });
      wrap.addEventListener("touchmove", onMove, { passive: true });
      wrap.addEventListener("touchend", onEnd);
      // Mouse drag support (desktop)
      wrap.addEventListener("mousedown", onStart);
      wrap.addEventListener("mousemove", onMove);
      wrap.addEventListener("mouseup", onEnd);
    }

    // Block the next click so a swipe doesn't also trigger a card flip
    let clickBlocked = false;
    function blockNextClick() {
      clickBlocked = true;
      setTimeout(() => { clickBlocked = false; }, 400);
    }

    // ===== Render Card =====
    function renderCard() {
      let w, totalCount, posLabel;

      if (reviewMode) {
        if (reviewQueue.length === 0) {
          // Queue emptied — exit review mode
          reviewMode = false;
          currentIndex = 0;
          showDayCompleteBanner();
          return;
        }
        if (currentIndex >= reviewQueue.length) currentIndex = 0;
        w = reviewQueue[currentIndex];
        totalCount = reviewQueue.length;
        posLabel = `🔁 복습 ${currentIndex + 1} / ${totalCount}`;
      } else {
        const list = wordsOfDay(currentDay);
        if (list.length === 0) return;
        if (currentIndex >= list.length) currentIndex = list.length - 1;
        w = list[currentIndex];
        totalCount = list.length;
        posLabel = null;
      }

      // Store current example for the speaker button
      currentExampleSentence = w.exampleSentence;

      document.getElementById("emojiRow").textContent = w.situationEmoji;
      document.getElementById("wordText").innerHTML =
        `${escapeHtml(w.word)} <button class="speaker-btn" onclick="event.stopPropagation();speakWord('${escapeHtml(w.word)}')" title="미국식 발음">🔊</button>`;
      document.getElementById("posBadge").textContent = w.partOfSpeech;

      document.getElementById("backWord").innerHTML =
        `${escapeHtml(w.word)} <button class="speaker-btn" onclick="event.stopPropagation();speakWord('${escapeHtml(w.word)}')" title="미국식 발음">🔊</button>`;
      document.getElementById("backMeaning").innerHTML = renderMeaningsList(w.meanings);
      document.getElementById("sceneIllust").innerHTML =
        `<div class="scene-emoji">${w.situationEmoji}</div>`;

      // Example label with speaker button for the whole sentence
      const exLabelEl = document.getElementById("exampleLabel");
      if (exLabelEl) {
        exLabelEl.innerHTML = `📝 EXAMPLE <button class="speaker-btn example-speaker" onclick="event.stopPropagation();speakCurrentExample()" title="예문 읽기">🔊</button>`;
      }
      document.getElementById("exampleEn").innerHTML = renderClickableExample(w.exampleSentence);
      document.getElementById("exampleKr").textContent = w.exampleTranslation;

      // Review mode banner on card front
      const reviewBanner = document.getElementById("reviewBanner");
      if (reviewBanner) {
        if (reviewMode) {
          reviewBanner.style.display = "block";
          reviewBanner.textContent = posLabel;
        } else {
          reviewBanner.style.display = "none";
        }
      }

      // Prev/Next buttons
      if (reviewMode) {
        document.getElementById("prevBtn").disabled = true;
        document.getElementById("nextBtn").disabled = true;
      } else {
        document.getElementById("prevBtn").disabled = currentIndex === 0;
        document.getElementById("nextBtn").disabled = currentIndex === totalCount - 1;
      }
    }

    function speakCurrentExample() {
      if (currentExampleSentence) speakWord(currentExampleSentence);
    }

    function showDayCompleteBanner() {
      // Re-render in normal mode and show celebration
      document.getElementById("card").classList.remove("flipped");
      renderCard();
      // Briefly show an alert-like message
      setTimeout(() => {
        alert(`🎉 Day ${currentDay}의 모든 단어를 완벽하게 외웠어요!`);
      }, 100);
    }

    // ===== Render Progress Bar =====
    function renderProgress() {
      const list = wordsOfDay(currentDay);
      const done = dayCompletedCount(currentDay);
      const total = list.length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("progressText").textContent = `${done} / ${total} 외움`;
      document.getElementById("percentText").textContent = pct + "%";

      // Test button — always enabled; shows current progress as hint
      const btnTest = document.getElementById("btnStartTest");
      if (btnTest) {
        btnTest.disabled = false;
        btnTest.textContent = done < total
          ? `📝 이 Day 테스트 보기 (${done}/${total} 외움)`
          : "📝 이 Day 테스트 보기 ✨";
      }
    }

    // ===== Actions =====
    function toggleFlip() {
      if (clickBlocked) return;
      document.getElementById("card").classList.toggle("flipped");
    }

    function navigate(delta) {
      if (reviewMode) return; // In review mode, user must mark each card
      const list = wordsOfDay(currentDay);
      const next = currentIndex + delta;
      if (next < 0 || next >= list.length) return;
      currentIndex = next;
      document.getElementById("card").classList.remove("flipped");
      renderCard();
    }

    function markWord(known) {
      let w;
      if (reviewMode) {
        w = reviewQueue[currentIndex];
      } else {
        const list = wordsOfDay(currentDay);
        w = list[currentIndex];
      }
      if (!w) return;

      progress[w.word] = known;
      saveProgress();
      renderProgress();
      renderDayTabs();

      setTimeout(() => {
        document.getElementById("card").classList.remove("flipped");

        if (reviewMode) {
          if (known) {
            // Remove from queue
            reviewQueue.splice(currentIndex, 1);
            if (reviewQueue.length === 0) {
              reviewMode = false;
              currentIndex = 0;
              showDayCompleteBanner();
              return;
            }
            // Adjust index
            if (currentIndex >= reviewQueue.length) currentIndex = 0;
            renderCard();
          } else {
            // Keep in queue — shuffle and show next
            if (reviewQueue.length === 1) {
              // Only one item; stay on it
              renderCard();
            } else {
              // Remove current, reshuffle rest, put current at the end
              const current = reviewQueue.splice(currentIndex, 1)[0];
              reviewQueue = shuffle(reviewQueue);
              reviewQueue.push(current);
              currentIndex = 0;
              renderCard();
            }
          }
        } else {
          // Normal mode
          const list = wordsOfDay(currentDay);
          if (currentIndex < list.length - 1) {
            currentIndex++;
            renderCard();
          } else {
            // At last card — check if review mode should kick in
            const toReview = list.filter(x => progress[x.word] === false);
            if (toReview.length > 0) {
              reviewMode = true;
              reviewQueue = shuffle(toReview);
              currentIndex = 0;
              renderCard();
              // Subtle toast via progress text
              const pt = document.getElementById("progressText");
              if (pt) {
                const orig = pt.textContent;
                pt.textContent = `🔁 복습 모드 시작 — ${toReview.length}개 단어 재출제`;
                pt.style.color = "#8B5CF6";
                setTimeout(() => {
                  pt.style.color = "";
                  renderProgress();
                }, 2500);
              }
            } else {
              // Day complete — no words to review
              const done = dayCompletedCount(currentDay);
              if (done === list.length) {
                showDayCompleteBanner();
              }
            }
          }
        }
      }, 250);
    }

    function resetDay() {
      if (!confirm(`Day ${currentDay}의 진도를 초기화할까요?`)) return;
      wordsOfDay(currentDay).forEach(w => delete progress[w.word]);
      saveProgress();
      currentIndex = 0;
      reviewMode = false;
      reviewQueue = [];
      document.getElementById("card").classList.remove("flipped");
      renderCard();
      renderProgress();
      renderDayTabs();
    }

    // ===== Keyboard shortcuts =====
    document.addEventListener("keydown", (e) => {
      // Only apply study shortcuts when study view is active
      if (!document.getElementById("viewWordStudy").classList.contains("active")) return;
      if (e.key === "ArrowLeft") navigate(-1);
      else if (e.key === "ArrowRight") navigate(1);
      else if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        toggleFlip();
      } else if (e.key === "1") markWord(true);
      else if (e.key === "2") markWord(false);
    });

    // ========================================================
    //                     TEST MODULE (Unified)
    // ========================================================
    const WORD_TEST_SIZE = 15;
    const GRAMMAR_TEST_SIZE = 10;

    let currentTest = null;
    // currentTest = {
    //   mode: 'word' | 'grammar',
    //   title, subtitle,
    //   day?, topicId?, level?,           // metadata
    //   questions: [Q], idx, correctFirstTry,
    //   wrongWords?: Set (word mode),
    //   wrongQs?: [] (grammar mode)
    // }
    // Word Q = { mode:'word', type:1|2|3, correctWord, choices:[word,..] }
    // Grammar Q = { mode:'grammar', questionText, choices:[{text, correct, wrongReason}], explanation, sourceQ }
    let qState = null;
    // qState = { wrongAttempts:[], showingFeedback:false, solved:false, revealed:false, pickedIdx }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Replace target word (or inflected form) in sentence with a blank span
    function blankSentence(word, sentence) {
      const lower = sentence.toLowerCase();
      const w = word.toLowerCase();
      let idx = lower.indexOf(w);
      if (idx === -1) return null;
      let end = idx + w.length;
      // Extend to include suffix letters (dispatched, acquisitions, etc.)
      while (end < sentence.length && /[a-zA-Z]/.test(sentence[end])) end++;
      return sentence.slice(0, idx) +
        '<span class="blank">______</span>' +
        sentence.slice(end);
    }

    function buildWordQuestion(correctWord, pool) {
      // Pick 3 distractors
      const distractors = shuffle(pool.filter(x => x.word !== correctWord.word)).slice(0, 3);
      const choices = shuffle([correctWord, ...distractors]);

      // Random type: 1 (word→kor), 2 (kor→word), 3 (fill blank)
      let type = Math.floor(Math.random() * 3) + 1;

      // For type 3, verify the example actually contains the word
      if (type === 3) {
        const blanked = blankSentence(correctWord.word, correctWord.exampleSentence);
        if (!blanked) type = Math.random() < 0.5 ? 1 : 2;
      }

      return { mode: 'word', type, correctWord, choices };
    }

    function startCurrentDayTest() { startWordTest(currentDay); }

    function startWordTest(day) {
      const list = wordsOfDay(day);
      if (list.length === 0) return;
      const picked = shuffle(list).slice(0, WORD_TEST_SIZE);
      const questions = picked.map(w => buildWordQuestion(w, list));

      currentTest = {
        mode: 'word',
        day,
        title: `Day ${day} 단어 테스트`,
        questions,
        idx: 0,
        correctFirstTry: 0,
        wrongWords: new Set()
      };
      showView("viewTest");
      document.getElementById("testTitle").textContent = currentTest.title;
      renderQuestion();
    }

    function startGrammarTest(topicId, level) {
      const topic = GRAMMAR_TOPICS.find(t => t.id === topicId);
      if (!topic) return;
      const lv = topic.levels[level];
      if (!lv) return;

      // Clone + shuffle questions, and for each clone the choices and shuffle
      const questions = shuffle(lv.questions.slice()).slice(0, GRAMMAR_TEST_SIZE).map(q => ({
        mode: 'grammar',
        questionText: q.q,
        choices: shuffle(q.choices.slice()),
        explanation: q.explanation,
        sourceQ: q,
        topicId,
        topicTitle: topic.title,
        level,
        levelName: lv.name
      }));

      currentTest = {
        mode: 'grammar',
        topicId,
        level,
        title: `${topic.icon} ${topic.title} · ${lv.name}`,
        questions,
        idx: 0,
        correctFirstTry: 0,
        wrongQs: []
      };
      showView("viewTest");
      document.getElementById("testTitle").textContent = currentTest.title;
      renderQuestion();
    }

    function renderQuestion() {
      const q = currentTest.questions[currentTest.idx];
      qState = { wrongAttempts: [], showingFeedback: false, solved: false, revealed: false, pickedIdx: null };

      document.getElementById("testQnum").textContent =
        `${currentTest.idx + 1} / ${currentTest.questions.length}`;
      document.getElementById("testProgressBar").style.width =
        Math.round(((currentTest.idx) / currentTest.questions.length) * 100) + "%";

      const card = document.getElementById("questionCard");
      let typeLabel = "", prompt = "", qText = "", qClass = "";
      let choicesHtml = "";

      if (q.mode === 'word') {
        if (q.type === 1) {
          typeLabel = "📖 뜻 맞추기";
          prompt = "다음 영단어의 뜻은 무엇일까요?";
          qText = escapeHtml(q.correctWord.word);
        } else if (q.type === 2) {
          typeLabel = "🔤 영단어 맞추기";
          prompt = "다음 뜻에 해당하는 영단어는 무엇일까요?";
          qText = escapeHtml(q.correctWord.meaning);
        } else {
          typeLabel = "✍️ 빈칸 채우기";
          prompt = "문맥에 맞는 단어를 고르세요.";
          qText = blankSentence(q.correctWord.word, q.correctWord.exampleSentence);
          qClass = " sentence";
        }
        choicesHtml = q.choices.map((c, i) => {
          const label = (q.type === 1) ? escapeHtml(c.meaning) : escapeHtml(c.word);
          return `<button class="choice" data-idx="${i}" onclick="pickChoice(${i})">
            <span class="letter">${String.fromCharCode(65+i)}</span>${label}
          </button>`;
        }).join("");
      } else {
        // grammar
        typeLabel = "📖 " + escapeHtml(q.topicTitle);
        prompt = "빈칸에 들어갈 말로 가장 알맞은 것을 고르세요.";
        qText = highlightBlank(q.questionText);
        qClass = " sentence";
        choicesHtml = q.choices.map((c, i) => {
          return `<button class="choice" data-idx="${i}" onclick="pickChoice(${i})">
            <span class="letter">${String.fromCharCode(65+i)}</span>${escapeHtml(c.text)}
          </button>`;
        }).join("");
      }

      card.innerHTML = `
        <div class="q-type-badge">${typeLabel}</div>
        <div class="q-prompt">${prompt}</div>
